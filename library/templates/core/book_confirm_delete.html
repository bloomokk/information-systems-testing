{% extends "base.html" %}
{% block title %}Удалить книгу — Библиотека{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body">
                <h2 class="h5 mb-3">Удалить книгу?</h2>
                <p class="text-muted mb-4">«{{ book.title }}» — {{ book.author }}</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Удалить</button>
                        <a class="btn btn-outline-secondary" href="{% url 'core:book_list' %}">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
